<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <title>TODO</title>
        <style>
            body {
                font-family: system-ui, sans-serif;
                max-width: 820px;
                margin: 2em auto;
                padding: 0 1em;
                color: #1a1a1a;
                background: #fafafa;
            }
            h1 {
                border-bottom: 2px solid #1f3a5f;
                padding-bottom: 0.3em;
            }
            h2 {
                color: #1f3a5f;
                margin-top: 1.5em;
            }
            ul {
                list-style: none;
                padding-left: 0;
            }
            li {
                padding: 0.3em 0;
                border-bottom: 1px solid #eee;
            }
            input[type="checkbox"] {
                margin-right: 0.5em;
                transform: scale(1.2);
            }
            .priority {
                font-weight: bold;
                padding: 0.1em 0.4em;
                border-radius: 3px;
                margin-right: 0.5em;
                color: #fff;
                font-size: 0.85em;
            }
            .priority-critical {
                background: #7a1f1f;
            }
            .priority-high {
                background: #a85a1f;
            }
            .priority-medium {
                background: #1f3a5f;
            }
            .priority-low {
                background: #555;
            }
            .priority-longterm {
                background: #888;
            }
            .days {
                color: #666;
                font-size: 0.9em;
                margin-left: 0.4em;
            }
            @media (prefers-color-scheme: dark) {
                body {
                    background: #1a1a1a;
                    color: #f0f0f0;
                }
                h1 {
                    border-color: #4a8db5;
                }
                h2 {
                    color: #4a8db5;
                }
                li {
                    border-color: #333;
                }
                .days {
                    color: #aaa;
                }
            }
        </style>
    </head>
    <body>
        <h1>TODO</h1>
        <!-- BODY -->
    </body>
</html>
